# Killer Options Bot configuration.
# All risk numbers are conservative small-account defaults. Tune carefully.

account:
  # Your account size in dollars. Used to size and reject trades.
  value: 1000.0

# Account-size tiers: the strategy "bends" automatically with account value.
# The tier with the greatest min_value that is <= account.value is applied, and
# its sections (risk / contract_filters / exits / watchlist) are overlaid on top
# of the base sections below. Only list the keys you want to change per tier;
# anything not listed falls through to the base value. A tier's 'watchlist', if
# present, REPLACES the base watchlist entirely. Remove this block to disable.
#
# NOTE: these numbers are reasonable starting defaults, NOT validated on real
# market data yet. Tune them after a Tradier backtest shows real behaviour.
account_tiers:
  - min_value: 0        # $0 - $5k: survival. Cheap OTM weeklies, tight stops.
    # Small account stays on the two most liquid ETFs only. Tight spreads and
    # deep options chains matter far more than variety when capital is tiny.
    watchlist: [SPY, QQQ]
    # Only the base weekly momentum trade. No 0DTE gambling on a tiny account.
    strategies: [default]
    risk:
      max_trade_risk_pct: 0.30
      max_open_positions: 2
    contract_filters:
      min_delta: 0.20
      max_delta: 0.35
  - min_value: 5000     # $5k - $25k: build. A bit more premium, some spread.
    # Room to add a couple more highly-liquid names as the account grows.
    watchlist: [SPY, QQQ, IWM, AAPL]
    # Weekly trade, intraday 0DTE scalps, and multi-day swings.
    strategies: [default, zerodte, swing]
    risk:
      max_trade_risk_pct: 0.15
      max_open_positions: 3
    contract_filters:
      min_delta: 0.30
      max_delta: 0.45
  - min_value: 25000    # $25k+: scale. PDT no longer binds; wider posture.
    watchlist: [SPY, QQQ, IWM, AAPL, NVDA, MSFT, AMD]
    # Full playbook: weekly, 0DTE, swing, and long-dated LEAPS.
    strategies: [default, zerodte, swing, leaps]
    risk:
      max_trade_risk_pct: 0.10
      max_open_positions: 5
    contract_filters:
      min_delta: 0.35
      max_delta: 0.50

# Strategy "methods" (playbooks). Each overlays its own contract_filters/exits
# on top of the (tier-adjusted) base sections below; anything it doesn't set
# falls through to the base. A tier's `strategies:` list picks which are active
# for that account size. "default" is always available (the base weekly trade)
# and need not be defined here. Positions remember which strategy opened them,
# so each is managed with its own exits. signal currently supports: momentum.
#
# NOTE: unvalidated starting numbers. 0DTE is the highest-variance play here
# (an option can lose all value within hours) and is intentionally kept off the
# smallest tier. Tune after a real Tradier backtest.
strategies:
  zerodte:
    # Same-day / next-day expiries. Needs real delta to move, wider spreads
    # tolerated, fast profit-take, hard same-day exit (max_holding_days: 0).
    signal: momentum
    contract_filters:
      min_dte: 0
      max_dte: 1
      min_delta: 0.35
      max_delta: 0.55
      max_spread_pct: 0.18
    exits:
      profit_target_pct: 0.40
      stop_loss_pct: 0.30
      max_holding_days: 0
      min_dte_exit: 0
  swing:
    # Multi-day directional trades. Longer expiries give the move room to
    # develop, so a wider stop and a multi-day hold, exiting before theta bites.
    signal: momentum
    contract_filters:
      min_dte: 7
      max_dte: 21
      min_delta: 0.40
      max_delta: 0.60
      max_spread_pct: 0.12
    exits:
      profit_target_pct: 0.60
      stop_loss_pct: 0.40
      max_holding_days: 10
      min_dte_exit: 2
  leaps:
    # Long-dated, high-conviction directional bets. Deep-ish delta for share
    # substitution, patient hold measured in weeks, exit well before expiry.
    signal: momentum
    contract_filters:
      min_dte: 180
      max_dte: 540
      min_delta: 0.60
      max_delta: 0.80
      max_spread_pct: 0.10
    exits:
      profit_target_pct: 1.00
      stop_loss_pct: 0.50
      max_holding_days: 60
      min_dte_exit: 30


mode:
  # "scan" logs candidates only. "paper" also opens simulated positions.
  # "live" enables real orders but ONLY behind every guardrail in the "live"
  # section below (kill switch, loss lockouts, --i-understand-live, etc.).
  trading_mode: paper

watchlist:
  - SPY
  - QQQ


risk:
  # Fraction of account allowed at risk per trade. This caps the *full premium*
  # paid. It is set relatively high because the tight stop-loss below is the
  # real loss limiter: a 30% premium cap with a 25% stop means the actual loss
  # per trade is only ~7-8% of the account.
  max_trade_risk_pct: 0.30
  # Max simultaneous open positions (enforced in paper/live phases).
  max_open_positions: 3
  # Max new trades logged per calendar week.
  max_trades_per_week: 10

contract_filters:
  # Weekly / short-dated horizon for a small-account challenge.
  # Floor of 2 DTE avoids buying options that expire before the move can play
  # out (a near-certain loss on OTM contracts held to next-day expiry).
  min_dte: 2
  max_dte: 7
  # Absolute delta band for the long option. Slightly-OTM (~0.20-0.40) keeps
  # weekly tickets affordable on a small account while retaining directional
  # exposure.
  min_delta: 0.20
  max_delta: 0.40
  # Reject if (ask - bid) / mid exceeds this fraction.
  max_spread_pct: 0.12
  min_volume: 100
  min_open_interest: 500

signal:
  # Simple momentum gate. A call needs price above SMA and RSI in band.
  sma_period: 20
  rsi_period: 14
  rsi_min: 45
  rsi_max: 70

exits:
  # Paper-trade exit rules. Percentages are of the entry debit.
  # Take profit when the option mid is up this fraction (0.30 = +30%).
  profit_target_pct: 0.30
  # Cut the loss when the option mid is down this fraction (0.25 = -25%).
  # Tight stop: high-conviction, small-loss posture for weekly trades.
  stop_loss_pct: 0.25
  # Force an exit once the position has been held this many days.
  max_holding_days: 3
  # Also exit if DTE falls to or below this (0 = only force-exit at expiry).
  min_dte_exit: 0

storage:
  db_path: data/killer_options_bot.db
  # Optional hosted Postgres (e.g. Supabase). The DATABASE_URL env var, if set,
  # takes precedence over this value. Leave unset to use the SQLite db_path.
  # database_url: postgresql://postgres:PASSWORD@db.PROJECT.supabase.co:5432/postgres

live:
  # Live order placement. DISABLED by default. Every field below is a guardrail.
  # See the README "Live trading" section before touching any of this.
  enabled: false
  # Create this file at any time to instantly block all new live orders.
  kill_switch_file: KILL_SWITCH
  # Dollars of realized loss (from live trades) before the daily/weekly lockout.
  # 0 means "auto": 2% of account (daily) and 5% (weekly).
  max_daily_loss: 0
  max_weekly_loss: 0
  # Hard cap on contracts per single order.
  max_contracts_per_order: 1

withdraw:
  # ADVISORY ONLY. The bot never moves money; it only recommends when to take
  # cash off the table, based on your realized (banked) P/L. Set enabled: true
  # to see recommendations on the dashboard and via `killer-options-bot withdraw`.
  enabled: true
  # Your original deposit. 0 = fall back to account.value. Equity is measured as
  # starting_capital + realized P/L, and gains are measured above this.
  starting_capital: 1000.0
  # Profit rules never recommend leaving less than this in the account, so it can
  # keep trading. 0 = fall back to starting_capital (never dip into principal).
  min_trading_balance: 1000.0
  # On each NEW equity high, skim this fraction of gains into savings. 0 = off.
  skim_pct: 0.25
  # Set aside this fraction of realized profit for taxes (short-term = ordinary
  # income). This is a "reserve", not a spend. 0 = off.
  tax_reserve_pct: 0.30
  # Milestone ladder: when equity reaches `at`, suggest withdrawing `withdraw`.
  # Highest reached rung is shown. Empty list = off.
  milestones:
    - {at: 2000.0, withdraw: 1000.0}   # get your original stake back out
    - {at: 5000.0, withdraw: 1500.0}
  # Defensive de-risking: if equity falls this fraction below its peak, suggest
  # pulling drawdown_defense_pct of equity to cash. 0 = off. May go below the
  # trading floor on purpose (the point is to stop trading).
  drawdown_trigger_pct: 0.20
  drawdown_defense_pct: 0.50

