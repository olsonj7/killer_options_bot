# Killer Options Bot configuration.
# All risk numbers are conservative small-account defaults. Tune carefully.

account:
  # Your account size in dollars. Used to size and reject trades. Bump this
  # (and withdraw.starting_capital below) whenever you add/remove cash from
  # the account -- e.g. $1000 initial deposit + $1200 added = $2200.
  value: 2200.0

# Account-size tiers: the strategy "bends" automatically with account value.
# The tier with the greatest min_value that is <= account.value is applied, and
# its sections (risk / contract_filters / exits / watchlist) are overlaid on top
# of the base sections below. Only list the keys you want to change per tier;
# anything not listed falls through to the base value. A tier's 'watchlist', if
# present, REPLACES the base watchlist entirely. Remove this block to disable.
#
# NOTE: these numbers are reasonable starting defaults, NOT validated on real
# market data yet. Tune them after a Tradier backtest shows real behaviour.
account_tiers:
  - min_value: 0        # $0 - $5k: survival. Cheap OTM weeklies, tight stops.
    # Small account stays on the two most liquid ETFs only. Tight spreads and
    # deep options chains matter far more than variety when capital is tiny.
    watchlist: [SPY, QQQ]
    # Base weekly momentum trade PLUS 0DTE, enabled here to forward-test the
    # 0DTE playbook on live Tradier data (PAPER ONLY - no real capital). 0DTE is
    # the highest-variance mode; keep it on paper until real results prove out.
    # SPY/QQQ have daily expirations, so 0DTE contracts are always available.
    # NOTE: 'strat' (STRAT breakout) is implemented and tested but intentionally
    # NOT active yet — adding a third entry source works against the current
    # goal of FEWER, higher-quality trades. Enable it once default/zerodte prove
    # out with the new pickiness gates.
    strategies: [default, zerodte, reversal_0dte, weekly_reversion]
    risk:
      max_trade_risk_pct: 0.30
      # Two concurrent slots max on the smallest account. Combined with the
      # one-position-per-underlying-per-strategy rule, this keeps the book
      # small and stops correlated stacking (e.g. multiple SPY calls from one
      # strategy) that turns one weak read into several losses at once.
      max_open_positions: 2
    contract_filters:
      min_delta: 0.20
      max_delta: 0.35
  - min_value: 5000     # $5k - $25k: build. A bit more premium, some spread.
    # Room to add a couple more highly-liquid names as the account grows.
    watchlist: [SPY, QQQ, IWM, AAPL]
    # Weekly trade, intraday 0DTE scalps, and multi-day swings.
    strategies: [default, zerodte, swing]
    risk:
      max_trade_risk_pct: 0.15
      max_open_positions: 3
    contract_filters:
      min_delta: 0.30
      max_delta: 0.45
  - min_value: 25000    # $25k+: scale. PDT no longer binds; wider posture.
    watchlist: [SPY, QQQ, IWM, AAPL, NVDA, MSFT, AMD]
    # Full playbook: weekly, 0DTE, swing, and long-dated LEAPS.
    strategies: [default, zerodte, swing, leaps]
    risk:
      max_trade_risk_pct: 0.10
      max_open_positions: 5
    contract_filters:
      min_delta: 0.35
      max_delta: 0.50

# Strategy "methods" (playbooks). Each overlays its own contract_filters/exits
# on top of the (tier-adjusted) base sections below; anything it doesn't set
# falls through to the base. A tier's `strategies:` list picks which are active
# for that account size. "default" is always available (the base weekly trade)
# and need not be defined here. Positions remember which strategy opened them,
# so each is managed with its own exits. signal currently supports: momentum.
#
# NOTE: unvalidated starting numbers. 0DTE is the highest-variance play here
# (an option can lose all value within hours) and is intentionally kept off the
# smallest tier. Tune after a real Tradier backtest.
strategies:
  default:
    # The base weekly momentum trade. Only its scan cadence is set here; its
    # filters/exits come from the base (tier-adjusted) config sections below.
    scan_interval_minutes: 15
    # Shared with "weekly_reversion": both hold for about a week, so the bot
    # must never have one open a PUT while the other holds a CALL (or vice
    # versa) on the same underlying -- that's not a hedge, it's two opposing
    # weekly bets cancelling each other out. See config.py StrategyConfig.
    conflict_group: weekly
    contract_filters:
      # Tighter than the base 0.12: this strategy holds for days, so a wide
      # spread on entry makes it easy for the mid to gap straight past the
      # stop between 60s manage ticks. Narrower spreads = less slippage risk.
      max_spread_pct: 0.08
    limits:
      # One entry per underlying per day: without this, a stopped-out weekly
      # position could re-enter the same underlying same-day and chase the
      # whipsaw (observed live: 3 QQQ puts opened/closed in a single session).
      max_trades_per_day: 1
  zerodte:
    # Same-day / next-day expiries. Needs real delta to move, wider spreads
    # tolerated, fast profit-take, hard same-day exit (max_holding_days: 0).
    # Uses the INTRADAY momentum signal: a same-day option should be traded off
    # same-day price action, not stale daily closes.
    signal: intraday_momentum
    # Fast-moving, same-day expiry: hunt for entries every couple of minutes.
    scan_interval_minutes: 2
    contract_filters:
      min_dte: 0
      max_dte: 1
      min_delta: 0.35
      max_delta: 0.55
      max_spread_pct: 0.18
    exits:
      # Long-premium 0DTE is structurally LOW win rate (~35-45%): theta bleeds
      # every minute and you need a fast directional move. The edge, if any,
      # comes from big winners + banking partial profit early, NOT a high hit
      # rate. Target expectancy/profit-factor > 0, not "win %".
      profit_target_pct: 0.80
      # Wider stop than the weekly trade: 0DTE gamma/IV cause large intraday
      # swings, so a tight stop gets whipsawed out of trades that recover. The
      # trim ladder banks profit early, which offsets the bigger max loss.
      stop_loss_pct: 0.50
      max_holding_days: 0
      min_dte_exit: 0
      # Scale-out ladder: bank profit into strength, let a runner ride to the
      # 0.80 target (or the same-day forced exit). Fractions are of the
      # ORIGINAL contract count and must sum to < 1 (a runner is always left).
      # Requires position sizing to open >= 2 contracts (see the "sizing"
      # block); a single-contract position cannot be trimmed.
      trims:
        - at_pct: 0.25   # +25%: sell half
          fraction: 0.5
        - at_pct: 0.50   # +50%: sell another quarter
          fraction: 0.25
    limits:
      # No new 0DTE momentum entries during the low-volume midday chop window.
      # Toggle in the config UI; off by default so you can enable as needed.
      skip_midday: false
  reversal_0dte:
    # Same-day mean-reversion fade: RSI overbought/oversold extremes snap back
    # during consolidation. Opposite of zerodte momentum — fires when RSI is
    # BEYOND the band (> rsi_max = overbought → PUT; < rsi_min = oversold → CALL).
    signal: intraday_reversal
    scan_interval_minutes: 2
    contract_filters:
      min_dte: 0
      max_dte: 1
      min_delta: 0.35
      max_delta: 0.55
      max_spread_pct: 0.18
    exits:
      # Small target: in consolidation moves are short. Take 25% and get out.
      profit_target_pct: 0.25
      # Cut fast on failed reversals — a fade that keeps going is brutal.
      stop_loss_pct: 0.25
      max_holding_days: 0
      min_dte_exit: 0
      trims:
        - at_pct: 0.15   # +15%: sell half early
          fraction: 0.5
    limits:
      max_trades_per_day: 2
      # Reversal is specifically a morning/afternoon-end play.
      # Midday noise is the enemy of fades — skip it.
      skip_midday: true
  weekly_reversion:
    # Chop-friendly counterpart to "default": the base weekly trade is a
    # MOMENTUM system (buys continuation), which whipsaws in a range-bound /
    # consolidating tape. This fades RSI extremes back toward the SMA instead
    # of chasing direction, using DAILY closes (so it can hold a few days,
    # unlike reversal_0dte's same-day fade). Mirrors reversal_0dte's logic at
    # a weekly horizon. Uses the same signal.sma_period/rsi_period/rsi_min/
    # rsi_max as "default" and reversal_0dte's rsi thresholds.
    signal: daily_reversal
    # No need to re-check faster than a normal weekly scan cadence.
    scan_interval_minutes: 15
    # See "default" above: shares a conflict_group so the two weekly-cadence
    # strategies never fight each other with opposite-side positions on the
    # same underlying.
    conflict_group: weekly
    limits:
      # Same overtrading guard as "default": one entry per underlying per day.
      max_trades_per_day: 1
    contract_filters:
      # Slightly wider DTE than "default" so theta decay is more forgiving
      # while a reversion move plays out over several days.
      min_dte: 3
      max_dte: 10
      min_delta: 0.25
      max_delta: 0.40
      # Tighter than the base 0.12 -- see "default" above for the reasoning
      # (narrower spreads reduce mid-price gaps past the stop between ticks).
      max_spread_pct: 0.08
    exits:
      # Bigger target/stop than 0DTE reversal since this holds days, not
      # minutes — needs room for the reversion move to actually develop.
      profit_target_pct: 0.35
      stop_loss_pct: 0.30
      max_holding_days: 5
      min_dte_exit: 1
      trims:
        - at_pct: 0.20   # +20%: bank half early, let the rest run to target
          fraction: 0.5
  strat:
    # Price-action day trade distilled from TheSTRAT / smart-money course:
    # enter on a directional STRAT "2" bar (breaks the prior bar's high/low)
    # that shows displacement (an impulse-sized range) and aligns with the
    # prior-day high/low bias. Uses the 'strat_breakout' signal on OHLC bars.
    signal: strat_breakout
    # Intraday breakout: re-check for a fresh trigger every few minutes.
    scan_interval_minutes: 5
    contract_filters:
      # Short-dated so a same-session directional move pays; 0-2 DTE.
      min_dte: 0
      max_dte: 2
      # Enough delta to actually move on an intraday break.
      min_delta: 0.40
      max_delta: 0.60
      max_spread_pct: 0.18
    exits:
      # Directional day trade: take a solid move, cut a failed break quickly.
      profit_target_pct: 0.50
      stop_loss_pct: 0.40
      # Day-trade horizon: exit same day, carry to next session at most.
      max_holding_days: 1
      min_dte_exit: 0
      # Bank into strength and leave a runner for a trend day.
      trims:
        - at_pct: 0.30   # +30%: sell half
          fraction: 0.5
  swing:
    # Multi-day directional trades. Longer expiries give the move room to
    # develop, so a wider stop and a multi-day hold, exiting before theta bites.
    signal: momentum
    # Multi-day horizon: a look every half hour is plenty for entries.
    scan_interval_minutes: 30
    contract_filters:
      min_dte: 7
      max_dte: 21
      min_delta: 0.40
      max_delta: 0.60
      max_spread_pct: 0.12
    exits:
      profit_target_pct: 0.60
      stop_loss_pct: 0.40
      max_holding_days: 10
      min_dte_exit: 2
      # Trend trade: let winners run. Once up +30% a trailing stop arms and
      # replaces the fixed profit target, exiting only after the option mid
      # gives back 20% from its high-water peak. Stop/max-hold/DTE still apply.
      trail_activate_pct: 0.30
      trail_pct: 0.20
  leaps:
    # Long-dated, high-conviction directional bets. Deep-ish delta for share
    # substitution, patient hold measured in weeks, exit well before expiry.
    signal: momentum
    # Long horizon: entries only need checking a few times a day.
    scan_interval_minutes: 180
    contract_filters:
      min_dte: 180
      max_dte: 540
      min_delta: 0.60
      max_delta: 0.80
      max_spread_pct: 0.10
    exits:
      profit_target_pct: 1.00
      stop_loss_pct: 0.50
      max_holding_days: 60
      min_dte_exit: 30
      # High-conviction long-dated bet: ride the trend. Arm the trailing stop
      # after +50% and give the runner a wider 30% give-back band so normal
      # multi-week volatility doesn't shake it out of a big move.
      trail_activate_pct: 0.50
      trail_pct: 0.30


mode:
  # "scan" logs candidates only. "paper" also opens simulated positions.
  # "live" enables real orders but ONLY behind every guardrail in the "live"
  # section below (kill switch, loss lockouts, --i-understand-live, etc.).
  trading_mode: paper

watchlist:
  - SPY
  - QQQ


risk:
  # Fraction of account allowed at risk per trade. This caps the *full premium*
  # paid. It is set relatively high because the tight stop-loss below is the
  # real loss limiter: a 30% premium cap with a 25% stop means the actual loss
  # per trade is only ~7-8% of the account.
  max_trade_risk_pct: 0.30
  # Max simultaneous open positions (enforced in paper/live phases).
  max_open_positions: 3
  # Max new trades logged per calendar week. Lowered 10 -> 6 to force selection:
  # with a weekly budget the bot must save its entries for the best setups
  # rather than firing on every marginal signal.
  max_trades_per_week: 6

contract_filters:
  # Weekly / short-dated horizon for a small-account challenge.
  # Floor of 2 DTE avoids buying options that expire before the move can play
  # out (a near-certain loss on OTM contracts held to next-day expiry).
  min_dte: 2
  max_dte: 7
  # Absolute delta band for the long option. Slightly-OTM (~0.20-0.40) keeps
  # weekly tickets affordable on a small account while retaining directional
  # exposure.
  min_delta: 0.20
  max_delta: 0.40
  # Reject if (ask - bid) / mid exceeds this fraction.
  max_spread_pct: 0.12
  min_volume: 100
  min_open_interest: 500

signal:
  # Simple momentum gate. A call needs price above SMA and RSI in band.
  sma_period: 20
  rsi_period: 14
  # Tighter RSI band (was 45): a call now needs RSI >= 50, i.e. real strength
  # rather than a barely-positive drift. Puts still require RSI < this floor.
  rsi_min: 50
  rsi_max: 70
  # Quality gates that make entries far pickier (both signals use these):
  #  - price must sit at least this fraction BEYOND the SMA, not just on the
  #    right side of it, so noise around the mean does not trigger a trade.
  #  - the SMA must be sloping the trade's way over slope_lookback bars, so we
  #    only buy calls in a rising trend and puts in a falling one.
  trend_buffer_pct: 0.004   # 0.4% beyond the SMA
  slope_lookback: 3
  # Intraday-signal settings, used by the 'intraday_momentum' signal (0DTE).
  # Bars come from Tradier timesales at this interval; shorter SMA/RSI periods
  # let a same-day trend register early (9-period on 5min bars ~= 45 min in).
  intraday_interval: 5min   # one of: 1min, 5min, 15min
  intraday_sma_period: 9
  intraday_rsi_period: 9
  # STRAT breakout settings, used by the 'strat_breakout' signal. Bars are
  # OHLC (Tradier timesales) at strat_interval. A directional "2" bar triggers
  # only when its range clears strat_displacement_mult x the average range of
  # the prior strat_atr_period bars (an impulse), and the break aligns with the
  # prior-day high/low bias.
  strat_interval: 15min      # one of: 1min, 5min, 15min
  strat_displacement_mult: 1.5
  strat_atr_period: 10
  # Higher-timeframe trend alignment, used by the daily 'momentum' /
  # 'daily_reversal' signals ("default" and "weekly_reversion"). Daily closes
  # are bucketed into weekly_bar_days-day groups to build a synthetic weekly
  # bar; a CALL is refused while that weekly trend is still down and a PUT is
  # refused while it is still up. Added after a live PUT fired on a green
  # weekly bar -- the daily SMA/RSI read was bearish while the weekly trend
  # had already turned, which is exactly the countertrend entry this blocks.
  weekly_bar_days: 5
  weekly_sma_period: 8
  # Support/resistance guard: refuse a PUT within sr_buffer_pct of the lowest
  # close over the last sr_lookback daily bars (likely support / bounce zone),
  # and refuse a CALL within that buffer of the highest close (likely
  # resistance / rejection zone). 0 disables; set > 0 to arm.
  sr_lookback: 20
  sr_buffer_pct: 0.01

exits:
  # Paper-trade exit rules. Percentages are of the entry debit.
  # Take profit when the option mid is up this fraction (0.30 = +30%).
  profit_target_pct: 0.30
  # Cut the loss when the option mid is down this fraction (0.25 = -25%).
  # Tight stop: high-conviction, small-loss posture for weekly trades.
  stop_loss_pct: 0.25
  # Force an exit once the position has been held this many days.
  max_holding_days: 3
  # Also exit if DTE falls to or below this (0 = only force-exit at expiry).
  min_dte_exit: 0

costs:
  # Transaction-cost assumptions for paper fills. Filling at the mid overstates
  # edge; in reality you buy near the ask and sell near the bid, plus a per-
  # contract commission. These feed the paper engine so scan/manage and the run
  # loop record realistic entry/exit prices and P/L.
  enabled: true
  # Dollars charged per contract on BOTH entry and exit.
  commission_per_contract: 0.65
  # Fraction of the half-spread you cross: 1.0 = pay full ask / receive full bid
  # (conservative, realistic for illiquid weeklies); 0.0 = fill at mid.
  slippage_frac: 1.0

sizing:
  # Position sizing: how many contracts to buy per signal. When disabled every
  # trade is a single contract (legacy behaviour). When enabled the engine
  # spends the per-trade risk budget on as many contracts as fit, capped by
  # max_contracts and floored at 1. Buying >= 2 contracts is what makes the
  # 0DTE scale-out (trims) possible.
  enabled: true
  # Never buy more than this many contracts on one signal.
  max_contracts: 10
  # Fraction of the account to spend per trade. If unset, falls back to
  # risk.max_trade_risk_pct.
  # risk_per_trade_pct: 0.30

storage:
  db_path: data/killer_options_bot.db
  # Optional hosted Postgres (e.g. Supabase). The DATABASE_URL env var, if set,
  # takes precedence over this value. Leave unset to use the SQLite db_path.
  # database_url: postgresql://postgres:PASSWORD@db.PROJECT.supabase.co:5432/postgres

live:
  # Live order placement. DISABLED by default. Every field below is a guardrail.
  # See the README "Live trading" section before touching any of this.
  enabled: false
  # Create this file at any time to instantly block all new live orders.
  kill_switch_file: KILL_SWITCH
  # Dollars of realized loss (from live trades) before the daily/weekly lockout.
  # 0 means "auto": 2% of account (daily) and 5% (weekly).
  max_daily_loss: 0
  max_weekly_loss: 0
  # Hard cap on contracts per single order.
  max_contracts_per_order: 1

withdraw:
  # ADVISORY ONLY. The bot never moves money; it only recommends when to take
  # cash off the table, based on your realized (banked) P/L. Set enabled: true
  # to see recommendations on the dashboard and via `killer-options-bot withdraw`.
  enabled: true
  # Your total net deposits (all money put in, minus any withdrawn) -- NOT a
  # one-time "original" figure. 0 = fall back to account.value. Bump this each
  # time you add or remove cash so gains stay measured above the right base.
  # Currently $1000 initial + $1200 added = $2200. Equity is measured as
  # starting_capital + realized P/L, and gains are measured above this.
  starting_capital: 2200.0
  # Profit rules never recommend leaving less than this in the account, so it can
  # keep trading. 0 = fall back to starting_capital (never dip into principal).
  min_trading_balance: 2200.0
  # On each NEW equity high, skim this fraction of gains into savings. 0 = off.
  skim_pct: 0.25
  # Set aside this fraction of realized profit for taxes (short-term = ordinary
  # income). This is a "reserve", not a spend. 0 = off.
  tax_reserve_pct: 0.30
  # Milestone ladder: when equity reaches `at`, suggest withdrawing `withdraw`.
  # Highest reached rung is shown. Empty list = off. Rungs must sit ABOVE
  # starting_capital ($2,200) or they trigger immediately on the next scan.
  milestones:
    - {at: 3000.0, withdraw: 1000.0}   # first profit checkpoint above deposits
    - {at: 6000.0, withdraw: 1500.0}
  # Defensive de-risking: if equity falls this fraction below its peak, suggest
  # pulling drawdown_defense_pct of equity to cash. 0 = off. May go below the
  # trading floor on purpose (the point is to stop trading).
  drawdown_trigger_pct: 0.20
  drawdown_defense_pct: 0.50

